name: Update Star Rail Data

on:
  schedule:
    # 毎日午前0時（日本時間）に実行する設定 (UTCでは前日の15:00)
    - cron: '0 15 * * *'
  workflow_dispatch: # 手動でいつでも実行できるようにするボタン

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: チェックアウト
      uses: actions/checkout@v4

    - name: Node.jsのセットアップ
      uses: actions/setup-node@v4
      with:
        node-node-version: '20'

    # 必要に応じてAPIライブラリなどをインストールする場合はここで行う
    # - name: 依存関係のインストール
    #   run: npm install

    - name: データ取得スクリプトの実行
      env:
        HOYO_LTOKEN: ${{ secrets.HOYO_LTOKEN }}
        HOYO_LTUID: ${{ secrets.HOYO_LTUID }}
      run: node update_data.js

    - name: 変更をGitHub Pagesへコミット＆プッシュ
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html
        git diff --cached --quiet || (git commit -m "Auto update Star Rail data" && git push)