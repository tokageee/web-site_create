name: Update Star Rail Data

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: チェックアウト
      uses: actions/checkout@v4

    - name: Node.jsのセットアップ
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: ライブラリのインストール
      run: npm install # ← ここを追加しました！

    - name: データ取得スクリプトの実行
      env:
        HOYO_LTOKEN: ${{ secrets.HOYO_LTOKEN }}
        HOYO_LTUID: ${{ secrets.HOYO_LTUID }}
      run: node update_data.js

    - name: 変更をGitHub Pagesへコミット＆プッシュ
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html
        git diff --cached --quiet || (git commit -m "Auto update Star Rail data" && git push)