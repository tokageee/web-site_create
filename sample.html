     <title>テストページ</title>
    <link href="styles/style.css" rel="stylesheet" />
    <script>
        function query() {
            let address = document.getElementById('address').value;
            let url = 'https://maps.google.co.jp/maps?output=embed&q=' + address;
            let map = document.getElementById('map');
            map.src = url;
        }
    </script> 
                <div>
                <h3 id="診断" class="h3">診断</h3>
                <div>
                    <input id="name" type="text" />さんの
                    <input id="prop" type="text" />度を
                    <button id="shindan">診断</button>
                    <div id="result"></div>
                </div>
            </div>
    <script>
             const shindanButton = document.getElementById('shindan');
            console.log(shindanButton);
            shindanButton.addEventListener('click', function() {
                shindan();
            });
         function shindan() {
            let name = document.getElementById('name').value;
            let prop = document.getElementById('prop').value;
            console.log('診断');
            let v = hashCode(name + prop) % 101;
            v = Math.abs(v);
            let result = document.getElementById('result');
            let s = name + 'さんの' + prop + '度は、' + v + '%です。';
            result.textContent = s;
        }
        function hashCode(s) {
            let hash = 0;
            for (let i = 0; i < s.length; i++) {
                hash = hash * 31 + s.charCodeAt(i);
            }
            return hash;
    
        }
    </script>
